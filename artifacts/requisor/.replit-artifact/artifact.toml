kind = "web"
previewPath = "/"
title = "Requisor - AI Resume Analyser"
version = "1.0.0"
id = "artifacts/requisor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25359

[services.development]
run = "pnpm --filter @workspace/requisor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/requisor", "run", "build" ]
publicDir = "artifacts/requisor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25359"
BASE_PATH = "/"
